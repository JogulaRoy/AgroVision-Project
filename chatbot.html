<!DOCTYPE html>
<html lang="en">
<head>
  <title>Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h2>AgroBot 🌾</h2>
    </div>
    <div class="chat-box" id="chat-box">
      <div class="bot-message">Hello! How can I help you today?</div>
    </div>
    <div class="chat-input">
      <input type="text" id="user-input" placeholder="Type your message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    async function getResponse(message) {
        const response = await fetch("https://chatgpt-42.p.rapidapi.com/chat", {
            method: "POST",
            headers: {
                "content-type": "application/json",
                "X-RapidAPI-Key": "e8b8f6f566mshd40c285a27eaec1p1108d0jsn06475eb84d40",
                "X-RapidAPI-Host": "chatgpt-42.p.rapidapi.com"
            },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [
                    {
                        role: "user",
                        content: `You are an agriculture bot. You can answer crop techniques, pesticides, crop density, and any other agriculture-related questions. Strictly respond very precisely within 40-70 words only. Here is the user question: '${message}'`
                    }
                ]
            })
        });

        const data = await response.json();
        return data.choices[0].message.content;
    }

    async function sendMessage() {
        const input = document.getElementById("user-input");
        const message = input.value.trim();
        if (message === "") return;

        const chatBox = document.getElementById("chat-box");

        // Add user message
        const userMsg = document.createElement("div");
        userMsg.className = "user-message";
        userMsg.innerText = message;
        chatBox.appendChild(userMsg);

        // Add bot reply placeholder
        const botReply = document.createElement("div");
        botReply.className = "bot-message";
        botReply.innerText = "Thinking...";
        chatBox.appendChild(botReply);

        // Get bot response
        const userResponse = await getResponse(message);
        botReply.innerText = userResponse;

        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
