<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crop Disease Detection</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('imagedect.jpg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.55);
      z-index: -1;
    }
    h1 {
      color: #fff;
      margin-top: 40px;
      text-shadow: 2px 2px 6px #000;
    }
    .upload-container {
      margin: 30px auto;
      text-align: center;
      background-color: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 15px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease;
    }
    .upload-container:hover {
      transform: scale(1.02);
    }
    .upload-area {
      border: 2px dashed #4CAF50;
      padding: 30px;
      border-radius: 10px;
      cursor: pointer;
      background-color: #f4fff4;
    }
    .upload-area:hover {
      background-color: #e6ffe6;
    }
    .upload-area p {
      color: #333;
      margin: 5px;
    }
    .file-input {
      display: none;
    }
    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background-color: #388e3c;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .btn:hover {
      background-color: #2e7d32;
    }
    .predict-hint {
      font-size: 14px;
      color: #555;
      margin-top: 10px;
      font-style: italic;
    }
    .result-container {
      display: none;
      margin: 20px;
      background-color: rgba(255, 255, 255, 0.97);
      padding: 25px;
      border-radius: 15px;
      max-width: 800px;
      width: 90%;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .result-image img {
      width: 100%;
      max-width: 300px;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    h2, h4, p {
      color: #2e7d32;
      margin-bottom: 10px;
    }
    ol {
      text-align: left;
    }
  </style>
</head>
<body>

  <h1>🌾 Crop Disease Detection</h1>

  <div class="upload-container">
    <div class="upload-area" id="uploadArea">
      <p><strong>Upload a Crop Leaf Image</strong></p>
      <p>Click or drag-and-drop to select an image</p>
      <p><em>Formats: JPG, PNG, JPEG</em></p>
    </div>
    <input type="file" id="fileInput" class="file-input" accept="image/*">
    <button class="btn" id="uploadBtn">🔍 Predict Disease</button>
    <p class="predict-hint">Click the button after uploading to see the disease result.</p>
  </div>

  <div class="result-container" id="resultContainer">
    <div class="result-image">
      <img id="uploadedImage" src="" alt="Uploaded crop image">
    </div>
    <div class="result-details">
      <h2 id="diseaseName">Disease Name</h2>
      <p id="diseaseDescription">Disease description will appear here.</p>
      <div class="treatment-steps">
        <h4>🧪 Recommended Treatment:</h4>
        <ol id="treatmentSteps"></ol>
      </div>
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const resultContainer = document.getElementById('resultContainer');
    const uploadedImage = document.getElementById('uploadedImage');
    const diseaseName = document.getElementById('diseaseName');
    const diseaseDescription = document.getElementById('diseaseDescription');
    const treatmentSteps = document.getElementById('treatmentSteps');

    // Simulated database
    const diseaseDatabase = [
      {
        name: "Late Blight",
        crop:".",
        description: "Late blight affects potatoes and tomatoes...",
        treatments: ["Use fungicides", "Remove infected plants", "Improve air circulation"]
      },
      {
        name: "Powdery Mildew",
        crop:".",
        description: "Powdery mildew appears as white powder...",
        treatments: ["Apply sulfur-based fungicide", "Use neem oil", "Remove affected leaves"]
      },
      {
        name: "Bacterial Leaf Spot",
        crop:".",
        description: "Bacterial spots look like soaked spots...",
        treatments: ["Use copper bactericides", "Crop rotation", "Use clean seeds"]
      },
      {
        name: "Rust",
        crop:".",
        description: "Rust appears as brown pustules...",
        treatments: ["Use triazole fungicide", "Remove volunteer plants", "Crop rotation"]
      },
      {
        name: "Fusarium Wilt",
        crop:".",
        description: "Yellowing and wilting caused by soil fungus...",
        treatments: ["Remove infected plants", "Use resistant varieties", "Sterilize tools"]
      }
    ];

    uploadArea.addEventListener('click', () => fileInput.click());

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.style.backgroundColor = '#e6ffe6';
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.style.backgroundColor = '#f4fff4';
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.style.backgroundColor = '#f4fff4';
      if (e.dataTransfer.files.length) {
        fileInput.files = e.dataTransfer.files;
        showPreview(e.dataTransfer.files[0]);
      }
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) {
        showPreview(fileInput.files[0]);
      }
    });

    uploadBtn.addEventListener('click', () => {
      if (fileInput.files.length) {
        analyzeImage(); // simulated OR real
      } else {
        alert('⚠️ Please upload a valid leaf image first.');
      }
    });

    function showPreview(file) {
      if (!file.type.match('image.*')) {
        alert('❌ Only image files are allowed.');
        return;
      }
      const reader = new FileReader();
      reader.onload = (e) => {
        uploadedImage.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function analyzeImage() {
      diseaseName.textContent = "Analyzing...";
      diseaseDescription.textContent = "Please wait while we analyze your image.";
      treatmentSteps.innerHTML = "";
      resultContainer.style.display = "block";
      resultContainer.scrollIntoView({ behavior: 'smooth' });

      // === SIMULATED BACKEND LOGIC ===
      setTimeout(() => {
        const randomIndex = Math.floor(Math.random() * diseaseDatabase.length);
        const detectedDisease = diseaseDatabase[randomIndex];
        diseaseName.textContent = `${detectedDisease.name} (${detectedDisease.crop})`;
        diseaseDescription.textContent = detectedDisease.description;
        treatmentSteps.innerHTML = "";
        detectedDisease.treatments.forEach(t => {
          const li = document.createElement('li');
          li.textContent = t;
          treatmentSteps.appendChild(li);
        });
        const confidence = Math.floor(Math.random() * 20) + 80;
        const confidenceP = document.createElement('p');
        confidenceP.innerHTML = `<strong>Confidence:</strong> ${confidence}%`;
        diseaseDescription.after(confidenceP);
      }, 2000);

      // === ACTUAL BACKEND CALL (UNCOMMENT IF YOU HAVE A FASTAPI ENDPOINT) ===
      /*
      const file = fileInput.files[0];
      const formData = new FormData();
      formData.append("file", file);

      fetch("http://127.0.0.1:8000/predict", {
        method: "POST",
        body: formData,
      })
      .then(response => response.json())
      .then(data => {
        diseaseName.textContent = `${data.name} (${data.crop})`;
        diseaseDescription.textContent = data.description;
        treatmentSteps.innerHTML = "";
        data.treatments.forEach(t => {
          const li = document.createElement('li');
          li.textContent = t;
          treatmentSteps.appendChild(li);
        });
        const confidenceP = document.createElement('p');
        confidenceP.innerHTML = `<strong>Confidence:</strong> ${data.confidence}%`;
        diseaseDescription.after(confidenceP);
      })
      .catch(error => {
        diseaseName.textContent = "❌ Error";
        diseaseDescription.textContent = "Failed to analyze the image.";
        console.error("Error:", error);
      });
      */
    }
  </script>
</body>
</html>
